var active="B3",frame=document.getElementById("frame"),overlay=document.getElementById("overlay"),card=document.getElementById("card"),wallet=document.getElementById("wallet"),num=document.getElementById("num"),plus=document.getElementById("plus"),core=document.getElementById("core"),claim=document.getElementById("claim"),sel=document.getElementById("sel");
var target=120,display=120,counting=false,claimed=false;
function play(v){var a=new Audio(SND[v]);a.play().catch(function(){});}
document.querySelectorAll(".vbtn").forEach(function(b){b.onclick=function(){active=b.dataset.v;document.querySelectorAll(".vbtn").forEach(function(x){x.classList.toggle("active",x===b)});sel.textContent=active;}});
document.querySelectorAll(".vplay").forEach(function(b){b.onclick=function(){play(b.dataset.p)}});
document.getElementById("reset").onclick=function(){location.reload()};
function rc(el){var r=el.getBoundingClientRect(),f=frame.getBoundingClientRect();return{cx:r.left-f.left+r.width/2,cy:r.top-f.top+r.height/2}}
function startCount(){if(counting)return;counting=true;(function t(){var d=target-display;if(Math.abs(d)<0.5){display=target;num.textContent=Math.round(display);counting=false;return}display+=d*0.16+(d>0?0.6:-0.6);num.textContent=Math.round(display);requestAnimationFrame(t)})()}
function pulse(){wallet.animate([{transform:"scale(1)"},{transform:"scale(1.3)"},{transform:"scale(1)"}],{duration:300,easing:"ease-out"})}
function cheer(){core.animate([{borderColor:"#17D6CC",transform:"scale(1)"},{borderColor:"#FFD700",transform:"scale(1.12)"},{borderColor:"#17D6CC",transform:"scale(1)"}],{duration:600})}
function showPlus(n){plus.textContent="+"+n;plus.animate([{opacity:0,transform:"translateY(0)"},{opacity:1,transform:"translateY(-6px)",offset:.2},{opacity:0,transform:"translateY(-22px)"}],{duration:1000,easing:"ease-out"})}
function flash(){var f=document.createElement("div");f.className="flash";card.appendChild(f);f.animate([{opacity:.85},{opacity:0}],{duration:90}).onfinish=function(){f.remove()}}
function shake(){card.animate([{transform:"translateX(0)"},{transform:"translateX(-8px)"},{transform:"translateX(8px)"},{transform:"translateX(-5px)"},{transform:"translateX(0)"}],{duration:260,easing:"ease-out"})}
function shards(){var r=rc(card),cx=r.cx,cy=r.cy,cols=["#fff","#00FF9C","#00BFFF"];for(var i=0;i<20;i++){var s=document.createElement("div");s.className="shard";s.style.background=cols[i%3];s.style.left=(cx-3.5)+"px";s.style.top=(cy-3.5)+"px";overlay.appendChild(s);var ang=Math.random()*6.28,spd=120+Math.random()*110,dx=Math.cos(ang)*spd,dy=Math.sin(ang)*spd+40,rot=(Math.random()*2-1)*300;s.animate([{transform:"translate(0,0) rotate(0)",opacity:1},{transform:"translate("+dx+"px,"+dy+"px) rotate("+rot+"deg)",opacity:0}],{duration:480+Math.random()*220,easing:"cubic-bezier(.2,.7,.3,1)"}).onfinish=(function(el){return function(){el.remove()}})(s)}}
function gemFly(){var ob=claim.getBoundingClientRect(),f=frame.getBoundingClientRect(),sx=ob.left-f.left+ob.width/2,sy=ob.top-f.top+ob.height/2,wb=wallet.getBoundingClientRect(),ex=wb.left-f.left+wb.width/2,ey=wb.top-f.top+wb.height/2,reward=60,n=8,per=Math.floor(reward/n),rem=reward-per*n;for(var i=0;i<n;i++){var amt=per+(i>=n-rem?1:0),g=document.createElement("div");g.className="gem";g.style.left=(sx-9)+"px";g.style.top=(sy-9)+"px";overlay.appendChild(g);var p1x=(sx+ex)/2,p1y=Math.min(sy,ey)-34,kf=[],spin=(i%2?1:-1)*260;for(var k=0;k<=8;k++){var t=k/8,it=1-t,x=it*it*sx+2*it*t*p1x+t*t*ex,y=it*it*sy+2*it*t*p1y+t*t*ey;kf.push({transform:"translate("+(x-sx)+"px,"+(y-sy)+"px) rotate("+(45+spin*t)+"deg) scale("+(1-0.4*t)+")",offset:t})}var a=g.animate(kf,{duration:720+i*18,delay:i*52,easing:"cubic-bezier(.45,0,.4,1)",fill:"forwards"});a.onfinish=(function(el,am){return function(){el.remove();target+=am;startCount();pulse();cheer()}})(g,amt)}}
claim.onclick=function(){if(claimed)return;claimed=true;play(active);flash();shards();shake();showPlus(60);gemFly();claim.outerHTML='<span class="claimed">CLAIMED</span>';card.style.transition="opacity .3s";setTimeout(function(){card.style.opacity=".6"},360)};
</script></body></html>
