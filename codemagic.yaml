# Codemagic CI/CD — builds Ironbit for iOS on a cloud Mac and publishes to
# TestFlight. You do NOT need a Mac; Codemagic runs the whole thing remotely.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (in the Codemagic web UI + your Apple/Firebase accounts) before
# the first run. None of this needs a Mac:
#
#  1. Apple Developer Program membership ($99/yr) — required for TestFlight.
#  2. App Store Connect → create the app record with bundle id `com.erik.ironbit`.
#     Copy its "Apple ID" (a number) into APP_STORE_APPLE_ID below.
#  3. Codemagic → Teams → Integrations → App Store Connect: add an API key.
#     Name the integration `ironbit_asc` (or rename it in the `integrations`
#     block below to match).
#  4. Firebase console → add an iOS app with bundle id `com.erik.ironbit`,
#     download `GoogleService-Info.plist`, and either:
#       a) run `flutterfire configure` locally (regenerates lib/firebase_options.dart
#          with the real iOS appId), and/or
#       b) commit `ios/Runner/GoogleService-Info.plist` into the repo.
#     Until this is done the iOS Firebase appId is a placeholder and analytics
#     won't report correctly on iOS.
# ─────────────────────────────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: iOS – TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    # The Flutter project lives in app/ (repo root is the IRONBIT container).
    working_directory: app
    integrations:
      app_store_connect: ironbit_asc      # must match the ASC API key name in Codemagic
    environment:
      groups:
        - appstore                         # must hold CERTIFICATE_PRIVATE_KEY (a Codemagic secure env var — see setup)
      vars:
        APP_STORE_APPLE_ID: 6793704146     # numeric Apple ID for the com.erik.ironbit App Store Connect record
        BUNDLE_ID: com.erik.ironbit
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Initialize a clean keychain
        script: keychain initialize
      - name: Fetch or create the App Store signing certificate + profile (ASC key)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add the distribution certificate to the keychain
        script: keychain add-certificates
      - name: Apply the provisioning profile to the Xcode project
        script: xcode-project use-profiles
      - name: Static analysis gate
        script: flutter analyze
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      # Artifact globs are matched from the clone root, so include the app/ prefix.
      - app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - app/flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true         # auto-submit the build to TestFlight
        # No beta_groups here = the build lands in TestFlight for your internal
        # testers (you) to install via the TestFlight app once processed.

  # ── FREE smoke test: does the app even COMPILE on iOS? ────────────────────────
  # Needs NO Apple Developer account, NO signing, NO Firebase — just Codemagic.
  # RUN THIS ONE FIRST (pick it in "Start your first build") to shake out any
  # CocoaPods/plugin issues before you buy the $99 membership and wire TestFlight.
  ios-smoke-unsigned:
    name: iOS – compile smoke test (unsigned)
    max_build_duration: 45
    instance_type: mac_mini_m2
    working_directory: app
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build unsigned iOS (generates configs, runs pod install, xcodebuild)
        script: flutter build ios --release --no-codesign
    artifacts:
      - /tmp/xcodebuild_logs/*.log
