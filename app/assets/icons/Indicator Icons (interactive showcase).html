  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Ironbit — Indicator Icons<\u002Ftitle>\n<style>/* ============================================================================\n   IRONBIT — Colors & Type\n   Pixel-arcade workout RPG. Dark mode only. Neon-on-near-black.\n   Source of truth: lib/theme/tokens.dart (Flutter). If this drifts, code wins.\n   ========================================================================== */\n\n/* ----------------------------------------------------------------------------\n   FONTS  (local files under fonts/)\n   - PressStart2P : headings, ranks, labels, counters that need \"arcade cabinet\"\n   - ShareTechMono: timers, numeric counters, meta lines, body-ish mono copy\n   - Gotham       : longer-form body text (paragraphs, descriptions)\n   -------------------------------------------------------------------------- */\n@font-face {\n  font-family: \"PressStart2P\";\n  src: url(\"4cd6230e-f74c-47be-9a59-c010c729c136\") format(\"truetype\");\n  font-weight: 400;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"ShareTechMono\";\n  src: url(\"858156e7-9129-4f78-bd89-66ee83f8afab\") format(\"truetype\");\n  font-weight: 400;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"66e28c7f-38cb-4375-a28b-01bfefa05198\") format(\"opentype\");\n  font-weight: 400;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"a9162785-1ce0-47c1-ad39-d0da38e999c1\") format(\"opentype\");\n  font-weight: 500;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"906c5178-5f0f-4752-b93c-72508c23c454\") format(\"opentype\");\n  font-weight: 700;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Gotham\";\n  src: url(\"389904d7-febd-4390-9825-71a120bfbbf5\") format(\"opentype\");\n  font-weight: 900;\n  font-display: swap;\n}\n\n:root {\n  /* ==========================================================================\n     PALETTE  (exact hex from tokens.dart)\n     ======================================================================== */\n\n  /* Backgrounds / surfaces — near-black blue-violet, layered for elevation */\n  --bg:            #11111F;  /* app background                              */\n  --bg-grad-top:   #15152C;  /* subtle vertical bg gradient — top           */\n  --bg-grad-bottom:#0E0E1B;  /* subtle vertical bg gradient — bottom        */\n  --card:          #1C1C34;  /* default card / surface                      */\n  --surface-2:     #232342;  /* raised surface (mission card bg)            */\n  --surface-3:     #2A2A4E;  /* highest surface                            */\n\n  /* Borders */\n  --border:        #36365E;  /* default 1px border                          */\n  --border-variant:#45437A;  /* brighter border / secondary button fill     */\n  --border-dark:   #2A2A3E;  /* disabled fills, faint dividers              */\n\n  /* Brand accent — neon green is THE tap-target / identity color */\n  --neon:          #00FF9C;\n  --neon-dark:     #009955;  /* pressed / glow falloff                      */\n\n  /* Text */\n  --text:          #E8E8FF;  /* primary text                                */\n  --muted-text:    #9494B8;  /* secondary / \"the app's guess\" / suggestions */\n  --dim:           #555577;  /* disabled labels, faint axis labels          */\n\n  /* Signal accents */\n  --amber:         #FFD700;  /* reward / \"you leveled up\" / rewards-ready    */\n  --amber-dark:    #FFA500;\n  --cyan:          #00BFFF;  /* recovery / secondary accent                 */\n  --danger:        #FF2D55;  /* destructive / warnings (NEVER body-shaming) */\n\n  /* Class identity colors */\n  --class-assassin:#4DE5FF;  /* cyan   — Shoulders + Core                   */\n  --class-bruiser: #FFD700;  /* gold   — Chest + Back + Arms                */\n  --class-tank:    #FF2D55;  /* red    — Legs                              */\n  --class-vanguard:#B14DFF;  /* violet — all-round, unlocks at L10          */\n\n  /* Loot rarity — standard RPG convention: grey / green / blue / purple */\n  --rarity-common:   #9A9AAA;\n  --rarity-uncommon: #00FF9C;\n  --rarity-rare:     #00BFFF;\n  --rarity-epic:     #B14DFF;\n\n  /* ==========================================================================\n     TYPE FAMILIES\n     ======================================================================== */\n  --font-display: \"PressStart2P\", \"Courier New\", monospace; /* headings/labels */\n  --font-mono:    \"ShareTechMono\", \"Courier New\", monospace; /* counters/meta   */\n  --font-body:    \"Gotham\", system-ui, sans-serif;           /* paragraphs      */\n\n  /* ==========================================================================\n     SPACING SCALE  (kSpace1..5 = 4/8/12/16/24)\n     ======================================================================== */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n\n  /* Layout rules */\n  --home-pad:        16px;  /* kHomeHorizontalPadding                       */\n  --card-pad:        16px;  /* kCardPadding                                 */\n  --section-gap:     16px;  /* kSectionGap                                  */\n  --button-height:   48px;  /* kButtonHeight                                */\n  --primary-border:  1.2px; /* kPrimaryCardBorderWidth                      */\n\n  /* ==========================================================================\n     SHAPE — sharp 4px corners everywhere. No soft radii.\n     ======================================================================== */\n  --radius: 4px;            /* kCardRadius — the ONLY radius in the system   */\n\n  /* ==========================================================================\n     MOTION  (durations + easing from tokens.dart)\n     ======================================================================== */\n  --motion-fast: 120ms;     /* kMotionFast — taps                           */\n  --motion-base: 180ms;     /* kMotionBase — most transitions               */\n  --motion-pop:  220ms;     /* kMotionPop  — celebratory pops               */\n  --motion-curve: cubic-bezier(0.215, 0.61, 0.355, 1); /* easeOutCubic      */\n\n  /* ==========================================================================\n     NEON GLOW  (neonGlow() — emissive bloom on dark surfaces)\n     spreadRadius -2, blur 16, ~22% alpha of the accent.\n     ======================================================================== */\n  --glow-neon:  0 0 16px -2px rgba(0, 255, 156, 0.22);\n  --glow-amber: 0 0 16px -2px rgba(255, 215, 0, 0.22);\n  --glow-cyan:  0 0 16px -2px rgba(0, 191, 255, 0.22);\n}\n\n/* ============================================================================\n   SEMANTIC TYPE RAMP\n   Headings = PressStart2P (tight, pixel). Counters/meta = ShareTechMono.\n   Body = Gotham. All-caps is the default register for arcade labels.\n   ========================================================================== */\n\n/* Display / hero — onboarding slams, rank reveals */\n.t-display {\n  font-family: var(--font-display);\n  font-size: 28px;\n  line-height: 1.35;\n  letter-spacing: 0.5px;\n  color: var(--text);\n}\n\n/* H1 — screen titles, big mission titles */\n.t-h1 {\n  font-family: var(--font-display);\n  font-size: 18px;\n  line-height: 1.35;\n  color: var(--text);\n}\n\n/* H2 — section headers (DAILY QUESTS, etc.) */\n.t-h2 {\n  font-family: var(--font-display);\n  font-size: 13px;\n  line-height: 1.4;\n  color: var(--text);\n}\n\n/* Label — small PressStart2P tags, nav labels, chips */\n.t-label {\n  font-family: var(--font-display);\n  font-size: 10px;\n  line-height: 1.4;\n  letter-spacing: 0.3px;\n  color: var(--muted-text);\n}\n\n/* Micro label — tiny stat/axis labels (radar STR/AGI/END) */\n.t-micro {\n  font-family: var(--font-display);\n  font-size: 7px;\n  line-height: 1.4;\n  color: var(--muted-text);\n}\n\n/* Counter — big monospaced numerics: timers, weights, XP */\n.t-counter {\n  font-family: var(--font-mono);\n  font-size: 24px;\n  line-height: 1.1;\n  font-variant-numeric: tabular-nums;\n  color: var(--text);\n}\n\n/* Meta — mono support lines under titles, detail rows */\n.t-meta {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  line-height: 1.25;\n  color: var(--muted-text);\n}\n\n/* Body — longer descriptive copy */\n.t-body {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: 14px;\n  line-height: 1.5;\n  color: var(--text);\n}\n\n/* Body strong */\n.t-body-strong {\n  font-family: var(--font-body);\n  font-weight: 700;\n  font-size: 14px;\n  line-height: 1.5;\n  color: var(--text);\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; }\n  body {\n    background:\n      radial-gradient(120% 80% at 50% -10%, var(--bg-grad-top) 0%, var(--bg) 55%, var(--bg-grad-bottom) 100%);\n    color: var(--text);\n    font-family: var(--font-body);\n    min-height: 100vh;\n    padding: 52px 32px 72px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 44px;\n  }\n\n  /* ---- header ---- */\n  header { display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }\n  .brandline { display: flex; align-items: center; gap: 10px; }\n  .brandline .dot { width: 10px; height: 10px; background: var(--neon); box-shadow: var(--glow-neon); }\n  .brandline span { font-family: var(--font-display); font-size: 11px; letter-spacing: 1px; color: var(--neon); }\n  h1 { font-family: var(--font-display); font-size: 22px; line-height: 1.4; margin: 0; color: var(--text); }\n  .sub { font-family: var(--font-mono); font-size: 14px; color: var(--muted-text); max-width: 600px; line-height: 1.55; }\n\n  /* ---- icon grid ---- */\n  .grid { display: grid; grid-template-columns: repeat(3, minmax(240px, 312px)); gap: 26px; width: 100%; max-width: 1010px; }\n  @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }\n  .card {\n    background: var(--card);\n    border: var(--primary-border) solid var(--accent);\n    border-radius: var(--radius);\n    padding: 26px 24px 22px;\n    display: flex; flex-direction: column; align-items: center; gap: 4px;\n    box-shadow: 0 0 24px -8px var(--accent-soft);\n  }\n  .stage { width: 100%; height: 210px; display: flex; align-items: center; justify-content: center; }\n  .stage canvas { display: block; }\n  .label { font-family: var(--font-display); font-size: 14px; letter-spacing: .6px; color: var(--accent); margin-top: 6px; }\n  .flavor { font-family: var(--font-mono); font-size: 12.5px; color: var(--muted-text); text-align: center; line-height: 1.4; max-width: 240px; }\n\n  .specrow {\n    display: flex; align-items: center; gap: 14px; margin-top: 18px; padding-top: 16px;\n    border-top: 1px solid var(--border); width: 100%; justify-content: center;\n  }\n  .specrow .mini, .specrow .tiny { display: flex; align-items: center; justify-content: center; }\n  .scl { display: flex; flex-direction: column; align-items: center; gap: 5px; }\n  .scl .tl { font-family: var(--font-mono); font-size: 9px; color: var(--dim); }\n  .divider { width: 1px; height: 30px; background: var(--border); }\n  .swatch { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--muted-text); }\n  .swatch .chip { width: 13px; height: 13px; border-radius: 2px; background: var(--accent); box-shadow: 0 0 10px -2px var(--accent-soft); }\n\n  /* ---- in-context blocks ---- */\n  .ctxwrap { width: 100%; max-width: 1010px; display: grid; grid-template-columns: 360px 1fr; gap: 22px; }\n  @media (max-width: 880px) { .ctxwrap { grid-template-columns: 1fr; } }\n  .panel { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }\n  .ctxh { font-family: var(--font-display); font-size: 10px; color: var(--muted-text); margin: 0 0 16px; letter-spacing: .4px; }\n\n  /* character meter rows (mirrors Home character bar) */\n  .meter { display: flex; flex-direction: column; gap: 7px; padding: 11px 0; }\n  .meter + .meter { border-top: 1px solid var(--border-dark); }\n  .mrow { display: flex; align-items: center; justify-content: space-between; }\n  .mname { display: flex; align-items: center; gap: 9px; }\n  .mname .ico { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }\n  .mname .tx { font-family: var(--font-display); font-size: 8px; color: var(--muted-text); letter-spacing: .3px; white-space: nowrap; }\n  .mval { font-family: var(--font-mono); font-size: 14px; }\n  .seg { display: flex; gap: 3px; }\n  .seg i { flex: 1; height: 7px; background: var(--border-dark); border-radius: 1px; }\n  .seg i.on { background: var(--cyan); box-shadow: 0 0 8px -2px rgba(0,191,255,.5); }\n  .dia { display: flex; gap: 5px; align-items: center; }\n  .dia b { width: 9px; height: 9px; transform: rotate(45deg); background: var(--amber); box-shadow: 0 0 8px -2px rgba(255,215,0,.55); }\n  .dia b.off { background: var(--border-dark); box-shadow: none; }\n  .statline { font-family: var(--font-mono); font-size: 11px; color: var(--muted-text); }\n\n  /* chip / pill row */\n  .row { display: flex; flex-wrap: wrap; gap: 12px; align-content: flex-start; }\n  .pill { display: flex; align-items: center; gap: 9px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 13px; }\n  .pill canvas { display: block; }\n  .pill .t { font-family: var(--font-mono); font-size: 13px; color: var(--text); }\n  .pill.neon  { border-color: var(--neon);  box-shadow: var(--glow-neon); }\n  .pill.amber { border-color: var(--amber); box-shadow: var(--glow-amber); }\n  .pill.amber .t { color: var(--amber); }\n  .pill.neon  .t { color: var(--neon); }\n  .ctxnote { font-family: var(--font-mono); font-size: 11px; color: var(--dim); margin-top: 16px; line-height: 1.5; }\n\n  /* vitality fill states */\n  .vitpanel { width: 100%; max-width: 1010px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }\n  .heartrow { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }\n  @media (max-width: 720px) { .heartrow { grid-template-columns: repeat(3, 1fr); row-gap: 22px; } }\n  .hstate { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px 8px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }\n  .hstate canvas { display: block; }\n  .hlbl { font-family: var(--font-display); font-size: 11px; letter-spacing: .5px; color: var(--muted-text); }\n  .hstate:first-child .hlbl { color: #FF4D63; }\n  .hstate:last-child .hlbl { color: var(--dim); }\n\n  /* streak variants */\n  .streakpanel { width: 100%; max-width: 1010px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }\n  .srow { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }\n  @media (max-width: 720px) { .srow { grid-template-columns: 1fr; } }\n  .scell { display: flex; flex-direction: column; align-items: center; gap: 9px; padding: 20px 10px 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }\n  .scell canvas { display: block; margin-bottom: 4px; }\n  .slbl { font-family: var(--font-display); font-size: 12px; letter-spacing: .5px; color: var(--amber); }\n  .sdesc { font-family: var(--font-mono); font-size: 11px; color: var(--dim); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <header>\n    <div class=\"brandline\"><div class=\"dot\"><\u002Fdiv><span>IRONBIT<\u002Fspan><\u002Fdiv>\n    <h1>INDICATOR ICONS<\u002Fh1>\n    <p class=\"sub\">Three status glyphs for the character bar — built in the pixel-arcade system: muted core, emissive rim, sharp 4px read. Each tags a meter label so STR/AGI/END, VIT and LCK are scannable at a glance.<\u002Fp>\n  <\u002Fheader>\n\n  <div class=\"grid\" id=\"grid\"><\u002Fdiv>\n\n  <div class=\"vitpanel\">\n    <p class=\"ctxh\">// VITALITY · RECOVERY — FILL STATES<\u002Fp>\n    <div class=\"heartrow\" id=\"heartrow\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"streakpanel\">\n    <p class=\"ctxh\">// LCK · STREAK — VARIANTS<\u002Fp>\n    <div class=\"srow\" id=\"srow\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ctxwrap\">\n    <div class=\"panel\">\n      <p class=\"ctxh\">// CHARACTER BAR — IN CONTEXT<\u002Fp>\n      <div class=\"meter\">\n        <div class=\"mrow\">\n          <div class=\"mname\"><span class=\"ico\" data-ic=\"stats\" data-px=\"16\"><\u002Fspan><span class=\"tx\">STATS · BUILD<\u002Fspan><\u002Fdiv>\n          <span class=\"mval\" style=\"color:var(--neon)\">LV.12 KNIGHT<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"statline\">STR 184&nbsp;&nbsp;·&nbsp;&nbsp;AGI 96&nbsp;&nbsp;·&nbsp;&nbsp;END 140<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meter\">\n        <div class=\"mrow\">\n          <div class=\"mname\"><span class=\"ico\" data-ic=\"vit\" data-px=\"18\" data-frac=\"0.72\"><\u002Fspan><span class=\"tx\">VIT · RECOVERY<\u002Fspan><\u002Fdiv>\n          <span class=\"mval\" style=\"color:var(--cyan)\">72 / 100<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"seg\" id=\"seg\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"meter\">\n        <div class=\"mrow\">\n          <div class=\"mname\"><span class=\"ico\" data-ic=\"lck\" data-px=\"16\"><\u002Fspan><span class=\"tx\">LCK · STREAK<\u002Fspan><\u002Fdiv>\n          <span class=\"mval\" style=\"color:var(--amber)\">2.0x<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"dia\"><b><\u002Fb><b><\u002Fb><b class=\"off\"><\u002Fb><b class=\"off\"><\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"panel\">\n      <p class=\"ctxh\">// AS LABEL CHIPS &amp; SCALE<\u002Fp>\n      <div class=\"row\">\n        <div class=\"pill neon\"><span data-ic=\"stats\" data-px=\"18\"><\u002Fspan><span class=\"t\">BUILD<\u002Fspan><\u002Fdiv>\n        <div class=\"pill\"><span data-ic=\"vit\" data-px=\"18\" data-frac=\"0.72\"><\u002Fspan><span class=\"t\">72% RECOVERED<\u002Fspan><\u002Fdiv>\n        <div class=\"pill amber\"><span data-ic=\"lck\" data-px=\"18\"><\u002Fspan><span class=\"t\">4-DAY STREAK<\u002Fspan><\u002Fdiv>\n        <div class=\"pill\"><span data-ic=\"stats\" data-px=\"18\"><\u002Fspan><span class=\"t\">RADAR<\u002Fspan><\u002Fdiv>\n        <div class=\"pill\"><span data-ic=\"lck\" data-px=\"18\"><\u002Fspan><span class=\"t\">2.0x XP<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"ctxnote\">Tint &amp; bloom are baked per icon — neon green for build, neutral-with-neon-edge for recovery, amber for streak. Render crisp from 16px through hero scale; never mix with rounded glyphs.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<script>\n/* ============================================================\n   PIXEL ICON RENDERER\n   Each icon is sampled onto a 32x32 grid via a cellType(x,y)\n   function returning 0 (empty) / 1 (body: muted core + bright\n   rim) / 2 (stroke: always bright). Rendered with an outer\n   bloom pass + crisp core/rim pass — same treatment as the\n   class emblems, so the whole set reads as one family.\n   ============================================================ */\nconst G = 36;\n\n/* ---- geometry helpers (work in centered units ~ -16..16) ---- */\nfunction sideSign(px, py, ax, ay, bx, by) { return (px - bx) * (ay - by) - (ax - bx) * (py - by); }\nfunction inTri(px, py, t) {\n  const d1 = sideSign(px, py, t[0][0], t[0][1], t[1][0], t[1][1]);\n  const d2 = sideSign(px, py, t[1][0], t[1][1], t[2][0], t[2][1]);\n  const d3 = sideSign(px, py, t[2][0], t[2][1], t[0][0], t[0][1]);\n  const neg = d1 < 0 || d2 < 0 || d3 < 0, pos = d1 > 0 || d2 > 0 || d3 > 0;\n  return !(neg && pos);\n}\nfunction distSeg(px, py, ax, ay, bx, by) {\n  const dx = bx - ax, dy = by - ay, l2 = dx * dx + dy * dy;\n  let t = l2 ? ((px - ax) * dx + (py - ay) * dy) / l2 : 0;\n  t = Math.max(0, Math.min(1, t));\n  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));\n}\nfunction onPath(px, py, pts, half) {\n  for (let i = 0; i < pts.length - 1; i++)\n    if (distSeg(px, py, pts[i][0], pts[i][1], pts[i + 1][0], pts[i + 1][1]) <= half) return true;\n  return false;\n}\n\n/* ---- STATS / BUILD — radar triangle (frame ring + plotted shape) ---- */\nconst ST_OUTER = [[0, -11], [-10.5, 8], [10.5, 8]];\nconst ST_CENT = [(ST_OUTER[0][0] + ST_OUTER[1][0] + ST_OUTER[2][0]) / 3,\n                 (ST_OUTER[0][1] + ST_OUTER[1][1] + ST_OUTER[2][1]) / 3];\nconst ST_INSET = ST_OUTER.map(v => [ST_CENT[0] + (v[0] - ST_CENT[0]) * 0.72,\n                                    ST_CENT[1] + (v[1] - ST_CENT[1]) * 0.72]);\nconst ST_PLOT = [[0, -6], [-5.4, 4.6], [6.6, 2.6]];   // an uneven \"build\" reading\nfunction statsCell(x, y) {\n  if (inTri(x, y, ST_OUTER) && !inTri(x, y, ST_INSET)) return 2; // frame ring\n  if (inTri(x, y, ST_PLOT)) return 1;                            // plotted core\n  return 0;\n}\n\n/* ---- VITALITY / RECOVERY — shield + pulse line ---- */\nfunction shieldHalf(y) {\n  if (y < -12 || y > 13) return -1;\n  if (y <= 2) return 11;\n  return 11 * Math.pow(1 - (y - 2) / 11, 0.7);\n}\nfunction inShield(x, y) {\n  const hw = shieldHalf(y);\n  if (hw < 0 || Math.abs(x) > hw) return false;\n  if (y < -9.5 && Math.abs(x) > 8.4) return false; // clip top corners\n  return true;\n}\nconst VIT_PULSE = [[-8.6, 0.6], [-4.6, 0.6], [-2.4, -5], [-0.2, 5.4], [1.9, -2.4], [4.6, 0.6], [8.6, 0.6]];\nfunction vitCell(x, y) {\n  if (!inShield(x, y)) return 0;\n  if (onPath(x, y, VIT_PULSE, 1.2)) return 2; // neon pulse\n  return 1;                                   // neutral body, neon rim\n}\n\n/* ---- LCK / STREAK — central star with a dash of magic orbiting it ----\n   A modest 4-point amber twinkle sits at the core; a tapering violet comet\n   sweeps a tilted ellipse around it (back arc behind the star, front arc in\n   front) so the \"magic\" clearly circles. Two layers handle the occlusion. */\n\n// central 4-point sparkle (amber) — deliberately modest so the orbit leads\nfunction starCell(x, y) {\n  const Lv = 7.4, hwv = 2.4, Lh = 5.8, hwh = 2.1, p = 1.8;\n  const ax = Math.abs(x), ay = Math.abs(y);\n  if (ay <= Lv && ax <= hwv * Math.pow(1 - ay / Lv, p)) return 1; // vertical lobe\n  if (ax <= Lh && ay <= hwh * Math.pow(1 - ax / Lh, p)) return 1; // horizontal lobe\n  return 0;\n}\n\n// orbit (violet) — tilted ellipse, comet taper thin->thick toward a bright head\nconst OR_A = 13.6, OR_B = 5.0, OR_PHI = -11 * Math.PI / 180;\nconst OR_COS = Math.cos(OR_PHI), OR_SIN = Math.sin(OR_PHI);\nconst OR_T0 = 22 * Math.PI / 180, OR_SPAN = 318 * Math.PI / 180; // sweep w/ small gap\nfunction orbitPt(th) {\n  const bx = OR_A * Math.cos(th), by = OR_B * Math.sin(th);\n  return [bx * OR_COS - by * OR_SIN, bx * OR_SIN + by * OR_COS];\n}\nfunction orbitHit(x, y) {\n  let best = Infinity, bestYr = 0;\n  const N = 220;\n  for (let i = 0; i <= N; i++) {\n    const t = i / N, th = OR_T0 + t * OR_SPAN;\n    const p = orbitPt(th);\n    const d = Math.hypot(x - p[0], y - p[1]) - (0.5 + 1.25 * t); // taper\n    if (d < best) { best = d; bestYr = p[1]; }\n  }\n  const head = orbitPt(OR_T0 + OR_SPAN);           // bright comet head blob\n  if (Math.hypot(x - head[0], y - head[1]) <= 2.2) { best = -1; bestYr = head[1]; }\n  return { hit: best <= 0, yr: bestYr };\n}\nfunction orbitBackCell(x, y)  { const r = orbitHit(x, y); return (r.hit && r.yr < 0)  ? 1 : 0; } // far side\nfunction orbitFrontCell(x, y) { const r = orbitHit(x, y); return (r.hit && r.yr >= 0) ? 1 : 0; } // near side\n\n// generic orbit factory for extra rings (\"more magic\" variant)\nfunction makeOrbit(cfg) {\n  const cos = Math.cos(cfg.phi), sin = Math.sin(cfg.phi);\n  const pt = th => { const bx = cfg.A * Math.cos(th), by = cfg.B * Math.sin(th);\n    return [bx * cos - by * sin, bx * sin + by * cos]; };\n  function hit(x, y) {\n    let best = Infinity, bestYr = 0; const N = 220;\n    for (let i = 0; i <= N; i++) { const t = i / N, p = pt(cfg.t0 + t * cfg.span);\n      const d = Math.hypot(x - p[0], y - p[1]) - (0.5 + 1.25 * t);\n      if (d < best) { best = d; bestYr = p[1]; } }\n    const head = pt(cfg.t0 + cfg.span);\n    if (Math.hypot(x - head[0], y - head[1]) <= 2.0) { best = -1; bestYr = head[1]; }\n    return { hit: best <= 0, yr: bestYr };\n  }\n  return { back: (x, y) => { const r = hit(x, y); return (r.hit && r.yr < 0) ? 1 : 0; },\n           front: (x, y) => { const r = hit(x, y); return (r.hit && r.yr >= 0) ? 1 : 0; } };\n}\nconst ORB2 = makeOrbit({ A: 11.8, B: 3.8, phi: 44 * Math.PI / 180, t0: 158 * Math.PI / 180, span: 300 * Math.PI / 180 });\n\n/* ---- icon registry ---- (each icon = ordered layers, painted back-to-front) */\nconst ICONS = {\n  stats: {\n    label: 'STATS / BUILD', flavor: 'Character build radar — STR / AGI / END at a glance.',\n    accent: '#00FF9C', accentGlow: 'rgba(0,255,156,0.50)', hex: '#00FF9C',\n    layers: [{ cell: statsCell, base: '#0E5236', rim: '#00FF9C', glow: 'rgba(0,255,156,0.50)' }],\n  },\n  vit: {\n    label: 'VITALITY / RECOVERY', flavor: 'Lives-style heart — drains top-down as recovery is spent.',\n    accent: '#FF4D63', accentGlow: 'rgba(225,40,60,0.42)', hex: '#E1283C',\n    layers: [{ cell: vitCell, base: '#3C3C5E', rim: '#00FF9C', glow: 'rgba(0,255,156,0.30)' }],\n    heart: true,\n  },\n  lck: {\n    label: 'LCK / STREAK', flavor: 'A dash of magic orbits the star — clean days build reward power.',\n    accent: '#FFD700', accentGlow: 'rgba(255,215,0,0.45)', hex: '#FFD700 + #B14DFF',\n    layers: [\n      { cell: orbitBackCell,  base: '#4A2480', rim: '#B14DFF', glow: 'rgba(177,77,255,0.50)' }, // far arc (behind)\n      { cell: starCell,       base: '#9A6A0C', rim: '#FFD700', glow: 'rgba(255,215,0,0.40)', glowScale: 0.55 },\n      { cell: orbitFrontCell, base: '#4A2480', rim: '#B14DFF', glow: 'rgba(177,77,255,0.50)' }, // near arc (front)\n    ],\n  },\n};\n\n/* ---- grid build + render ---- */\nfunction buildGrid(cell) {\n  const g = [];\n  for (let yy = 0; yy < G; yy++) {\n    const row = [];\n    for (let xx = 0; xx < G; xx++) row.push(cell((xx + 0.5) - G / 2, (yy + 0.5) - G / 2));\n    g.push(row);\n  }\n  return g;\n}\nfunction filled(g, x, y) { return x >= 0 && y >= 0 && x < G && y < G && g[y][x] > 0; }\nfunction edge(g, x, y) {\n  if (g[y][x] <= 0) return false;\n  return !filled(g, x - 1, y) || !filled(g, x + 1, y) || !filled(g, x, y - 1) || !filled(g, x, y + 1);\n}\nfunction draw(canvas, icon, boxPx, pad, sizeGlow) {\n  sizeGlow = sizeGlow == null ? 1 : sizeGlow;\n  const layers = icon.layers;\n  layers.forEach(L => { if (!L._grid) L._grid = buildGrid(L.cell); });\n  const dpr = window.devicePixelRatio || 1;\n  const E = boxPx / G, size = boxPx + pad * 2;\n  canvas.width = size * dpr; canvas.height = size * dpr;\n  canvas.style.width = size + 'px'; canvas.style.height = size + 'px';\n  const ctx = canvas.getContext('2d');\n  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, size, size); ctx.imageSmoothingEnabled = false;\n\n  // combined bbox across all layers -> auto-fit (~92% of box, centered)\n  let minX = G, minY = G, maxX = -1, maxY = -1;\n  layers.forEach(L => { const g = L._grid;\n    for (let y = 0; y < G; y++) for (let x = 0; x < G; x++)\n      if (g[y][x] > 0) { if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; }\n  });\n  const sc = (G * 0.92) / Math.max(maxX - minX + 1, maxY - minY + 1);\n  const bcx = (minX + maxX + 1) / 2, bcy = (minY + maxY + 1) / 2;\n  const px = x => pad + ((x - bcx) * sc + G / 2) * E;\n  const py = y => pad + ((y - bcy) * sc + G / 2) * E;\n  const W = E * sc + 0.5;\n\n  layers.forEach(L => {\n    const g = L._grid, gs = L.glowScale == null ? 1 : L.glowScale;\n    // pass 1 — outer bloom\n    ctx.save();\n    ctx.shadowColor = L.glow;\n    ctx.shadowBlur = boxPx * 0.09 * gs * sizeGlow;\n    ctx.fillStyle = L.base;\n    for (let y = 0; y < G; y++) for (let x = 0; x < G; x++) if (g[y][x] > 0) ctx.fillRect(px(x), py(y), W, W);\n    ctx.restore();\n    // pass 2 — crisp core / rim / stroke\n    for (let y = 0; y < G; y++) for (let x = 0; x < G; x++) {\n      const v = g[y][x]; if (v <= 0) continue;\n      ctx.fillStyle = (v === 2 || edge(g, x, y)) ? L.rim : L.base;\n      ctx.fillRect(px(x), py(y), W, W);\n    }\n  });\n}\n\n/* ============================================================\n   VITALITY HEART — lives-style, drains top-down\n   Dedicated renderer: one heart silhouette, a waterline splits\n   it into red (below) and dark shell (above). Bright rim on the\n   silhouette edge + the liquid surface; red bloom on the fill.\n   ============================================================ */\nconst HG = 30, HS = HG / 3.0;\nfunction heartInside(X, Y) { const a = X * X + Y * Y - 1; return a * a * a - X * X * Y * Y * Y <= 0; }\nconst HEART_COL = { 1: '#1C1C2A', 2: '#4A4A66', 3: '#E1283C', 4: '#FF4D63' }; // navy core/rim, red core/rim\nfunction buildHeart(frac) {\n  const body = []; let minR = HG, maxR = -1;\n  for (let iy = 0; iy < HG; iy++) { body.push([]);\n    for (let ix = 0; ix < HG; ix++) {\n      const X = ((ix + 0.5) - HG / 2) / HS, Y = (HG / 2 - (iy + 0.5)) / HS;\n      const b = heartInside(X, Y) ? 1 : 0;\n      body[iy].push(b);\n      if (b) { if (iy < minR) minR = iy; if (iy > maxR) maxR = iy; }\n    } }\n  const H = maxR - minR + 1, redRows = Math.round(frac * H), firstRedRow = maxR - redRows + 1;\n  const g = [];\n  for (let iy = 0; iy < HG; iy++) { g.push([]);\n    for (let ix = 0; ix < HG; ix++) {\n      if (!body[iy][ix]) { g[iy].push(0); continue; }\n      const isRed = redRows > 0 && iy >= firstRedRow;\n      const e = !(body[iy - 1] && body[iy - 1][ix]) || !(body[iy + 1] && body[iy + 1][ix])\n             || !body[iy][ix - 1] || !body[iy][ix + 1];\n      const isWater = isRed && iy === firstRedRow;\n      g[iy].push(isRed ? ((e || isWater) ? 4 : 3) : (e ? 2 : 1));\n    } }\n  return g;\n}\nfunction drawHeart(canvas, frac, boxPx, pad, glowScale) {\n  glowScale = glowScale == null ? 1 : glowScale;\n  const g = buildHeart(frac);\n  const dpr = window.devicePixelRatio || 1, E = boxPx / HG, size = boxPx + pad * 2;\n  canvas.width = size * dpr; canvas.height = size * dpr;\n  canvas.style.width = size + 'px'; canvas.style.height = size + 'px';\n  const ctx = canvas.getContext('2d');\n  ctx.scale(dpr, dpr); ctx.clearRect(0, 0, size, size); ctx.imageSmoothingEnabled = false;\n  let minX = HG, minY = HG, maxX = -1, maxY = -1;\n  for (let y = 0; y < HG; y++) for (let x = 0; x < HG; x++)\n    if (g[y][x] > 0) { if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; }\n  const sc = (HG * 0.94) / Math.max(maxX - minX + 1, maxY - minY + 1);\n  const bcx = (minX + maxX + 1) / 2, bcy = (minY + maxY + 1) / 2;\n  const px = x => pad + ((x - bcx) * sc + HG / 2) * E;\n  const py = y => pad + ((y - bcy) * sc + HG / 2) * E;\n  const W = E * sc + 0.5;\n  // bloom pass — red fill only\n  ctx.save(); ctx.shadowColor = 'rgba(225,40,60,0.5)'; ctx.shadowBlur = boxPx * 0.08 * glowScale; ctx.fillStyle = '#E1283C';\n  for (let y = 0; y < HG; y++) for (let x = 0; x < HG; x++) if (g[y][x] >= 3) ctx.fillRect(px(x), py(y), W, W);\n  ctx.restore();\n  // crisp pass\n  for (let y = 0; y < HG; y++) for (let x = 0; x < HG; x++) {\n    const v = g[y][x]; if (v <= 0) continue;\n    ctx.fillStyle = HEART_COL[v]; ctx.fillRect(px(x), py(y), W, W);\n  }\n}\n\n/* ---- cards ---- */\nconst gridEl = document.getElementById('grid');\nObject.keys(ICONS).forEach(key => {\n  const icon = ICONS[key];\n  const card = document.createElement('div');\n  card.className = 'card';\n  card.style.setProperty('--accent', icon.accent);\n  card.style.setProperty('--accent-soft', icon.accentGlow);\n\n  const stage = document.createElement('div'); stage.className = 'stage';\n  const hero = document.createElement('canvas'); stage.appendChild(hero);\n\n  const label = document.createElement('div'); label.className = 'label'; label.textContent = icon.label;\n  const flavor = document.createElement('div'); flavor.className = 'flavor'; flavor.textContent = icon.flavor;\n\n  const spec = document.createElement('div'); spec.className = 'specrow';\n  const s36 = document.createElement('div'); s36.className = 'scl';\n  const c36 = document.createElement('canvas'); const t36 = document.createElement('div'); t36.className = 'tl'; t36.textContent = '24px';\n  s36.append(c36, t36);\n  const s22 = document.createElement('div'); s22.className = 'scl';\n  const c22 = document.createElement('canvas'); const t22 = document.createElement('div'); t22.className = 'tl'; t22.textContent = '16px';\n  s22.append(c22, t22);\n  const div = document.createElement('div'); div.className = 'divider';\n  const sw = document.createElement('div'); sw.className = 'swatch'; sw.innerHTML = `<span class=\"chip\"><\u002Fspan>${icon.hex}`;\n  spec.append(s36, s22, div, sw);\n\n  card.append(stage, label, flavor, spec);\n  gridEl.appendChild(card);\n\n  draw(hero, icon, 156, 24, 1.0);\n  draw(c36, icon, 24, 3, 0.6);\n  draw(c22, icon, 16, 2, 0.5);\n  if (icon.heart) {\n    drawHeart(hero, 1, 156, 24, 1.0);\n    drawHeart(c36, 1, 24, 3, 0.6);\n    drawHeart(c22, 1, 16, 2, 0.5);\n  }\n});\n\n/* ---- vitality fill states ---- */\nconst FILLS = [[1, 'FULL'], [0.8, '80%'], [0.6, '60%'], [0.4, '40%'], [0.2, '20%'], [0, 'EMPTY']];\nconst heartRow = document.getElementById('heartrow');\nFILLS.forEach(([fr, lbl]) => {\n  const cell = document.createElement('div'); cell.className = 'hstate';\n  const cv = document.createElement('canvas'); drawHeart(cv, fr, 82, 13, 0.85);\n  const tl = document.createElement('div'); tl.className = 'hlbl'; tl.textContent = lbl;\n  cell.append(cv, tl); heartRow.appendChild(cell);\n});\n\n/* ---- streak variants ---- */\nconst STAR_ONLY = [{ cell: starCell, base: '#9A6A0C', rim: '#FFD700', glow: 'rgba(255,215,0,0.45)', glowScale: 0.7 }];\nconst STREAK_MORE = [\n  { cell: orbitBackCell,  base: '#4A2480', rim: '#B14DFF', glow: 'rgba(177,77,255,0.50)' },\n  { cell: ORB2.back,      base: '#5A2E92', rim: '#C77DFF', glow: 'rgba(199,125,255,0.50)' },\n  { cell: starCell,       base: '#9A6A0C', rim: '#FFD700', glow: 'rgba(255,215,0,0.40)', glowScale: 0.55 },\n  { cell: orbitFrontCell, base: '#4A2480', rim: '#B14DFF', glow: 'rgba(177,77,255,0.50)' },\n  { cell: ORB2.front,     base: '#5A2E92', rim: '#C77DFF', glow: 'rgba(199,125,255,0.50)' },\n];\nconst SVARS = [\n  { layers: STAR_ONLY,        lbl: 'NO STREAK', d: 'star \\u00b7 no magic' },\n  { layers: ICONS.lck.layers, lbl: 'ON STREAK', d: 'one orbit' },\n  { layers: STREAK_MORE,      lbl: 'HOT STREAK', d: 'double orbit' },\n];\nconst srow = document.getElementById('srow');\nSVARS.forEach(v => {\n  const cell = document.createElement('div'); cell.className = 'scell';\n  const cv = document.createElement('canvas'); draw(cv, { layers: v.layers }, 96, 18, 0.85);\n  const l = document.createElement('div'); l.className = 'slbl'; l.textContent = v.lbl;\n  const d = document.createElement('div'); d.className = 'sdesc'; d.textContent = v.d;\n  cell.append(cv, l, d); srow.appendChild(cell);\n});\n\n/* ---- inline context icons ---- */\ndocument.querySelectorAll('[data-ic]').forEach(el => {\n  const key = el.getAttribute('data-ic');\n  const icon = ICONS[key];\n  const pxs = parseInt(el.getAttribute('data-px'), 10);\n  const cv = document.createElement('canvas');\n  el.appendChild(cv);\n  if (key === 'vit') drawHeart(cv, parseFloat(el.getAttribute('data-frac') || '1'), pxs, 2, 0.5);\n  else draw(cv, icon, pxs, 2, 0.5);\n});\n\n/* ---- VIT segmented bar (72/100 -> ~12 of 16) ---- */\nconst seg = document.getElementById('seg');\nfor (let i = 0; i < 16; i++) {\n  const b = document.createElement('i');\n  if (i < 12) b.className = 'on';\n  seg.appendChild(b);\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
