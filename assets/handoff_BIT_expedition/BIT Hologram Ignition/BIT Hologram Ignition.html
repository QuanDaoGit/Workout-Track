<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"></meta>
<meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
<title>BIT — Hologram Ignition</title>
<style>
  :root{
    --bg:#0A0A14; --panel:#12121F; --border:#2A2A40; --text:#E8E8FF; --muted:#8A8AB0;
    --cyan:#57dbff; --dim:#4A4A6A;
    --mono:"ShareTechMono","Courier New",monospace;
    --disp:"PressStart2P","Courier New",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(120% 90% at 50% 8%, #15152a 0%, #0A0A14 60%, #06060d 100%);
    color:var(--text); font-family:var(--mono);
    min-height:100%; display:flex; flex-direction:column; align-items:center;
    gap:22px; padding:34px 0 44px;
  }
  .title{font-family:var(--disp); font-size:13px; letter-spacing:.5px; color:var(--text);}
  .subtitle{font-size:13px; color:var(--muted); max-width:520px; text-align:center; line-height:1.55;}
  .subtitle b{color:var(--cyan);}

  /* ── the stage: native rig coordinates (~370×460), scaled up ── */
  .stage-wrap{
    position:relative; width:592px; height:736px;     /* 370×460 · 1.6 */
    border:1px solid var(--border); border-radius:8px; overflow:hidden;
    background:
      radial-gradient(70% 42% at 50% 96%, rgba(0,191,255,.05), transparent 70%),
      linear-gradient(180deg, #0c0c18 0%, #0a0a14 70%, #08080f 100%);
  }
  .stage{
    position:absolute; left:0; top:0; width:370px; height:460px;
    transform:scale(1.6); transform-origin:0 0;
  }
  /* floor */
  .floor{ position:absolute; left:0; right:0; top:398px; height:62px;
    background:linear-gradient(180deg, rgba(40,46,86,.20), transparent);
    border-top:1px solid rgba(87,219,255,.10); }
  .floor::after{ content:""; position:absolute; left:50%; top:0; width:220px; height:1px;
    transform:translateX(-50%); background:linear-gradient(90deg,transparent,rgba(87,219,255,.22),transparent); }

  /* emitter console (the pad BIT projects from) */
  .pad{ position:absolute; left:131px; top:372px; width:108px; height:40px; image-rendering:pixelated; z-index:2; }
  .pad img{ width:108px; height:40px; image-rendering:pixelated; display:block; }

  /* hidden live BIT — bit.js paints this canvas; HoloBit samples it every frame */
  #bit{ position:absolute; left:-9999px; top:0; width:92px; height:92px; }

  /* the projection rig (room-sized) sits behind the hologram */
  #fx{ position:absolute; left:0; top:0; z-index:3; }
  /* the hologram of BIT, centred on the projection axis (x185, volume mid ~y338) */
  #holo{ position:absolute; left:129px; top:282px; width:112px; height:112px; z-index:4;
    image-rendering:pixelated; display:none; }

  /* phase caption pinned to the stage */
  .phase{ position:absolute; left:0; right:0; bottom:14px; text-align:center; z-index:6;
    font-family:var(--disp); font-size:8px; letter-spacing:.4px; color:var(--cyan);
    text-shadow:0 0 8px rgba(87,219,255,.5); transition:opacity .25s ease; }

  /* controls */
  .controls{ display:flex; align-items:center; gap:10px; }
  .btn{ font-family:var(--disp); font-size:9px; letter-spacing:.4px; cursor:pointer;
    padding:11px 15px 10px; border-radius:5px; border:1px solid var(--cyan);
    background:#0e1a22; color:var(--cyan); }
  .btn:hover{ background:#13242e; }
  .btn.toggle{ border-color:var(--border); color:var(--muted); background:var(--panel); }
  .btn.toggle.on{ border-color:var(--cyan); color:var(--cyan); background:#0e1a22; }

  .legend{ display:flex; gap:0; font-size:12px; color:var(--muted);
    border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .legend .step{ padding:8px 14px; border-right:1px solid var(--border); display:flex; gap:8px; align-items:center; }
  .legend .step:last-child{ border-right:none; }
  .legend .t{ font-family:var(--disp); font-size:7px; color:var(--dim); }
</style>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56">
    <rect width="80" height="56" fill="#0A0A14"></rect>
    <rect x="33" y="20" width="14" height="14" rx="2" fill="#1c6e92" stroke="#57dbff"></rect>
    <rect x="38" y="24" width="4" height="2" fill="#cdf6ff"></rect>
    <rect x="29" y="40" width="22" height="3" fill="#2bb2dc"></rect>
    <rect x="26" y="16" width="3" height="3" fill="#7cf2ff"></rect>
    <rect x="51" y="16" width="3" height="3" fill="#7cf2ff"></rect>
  </svg>
</template>
</head>
<body>
  <div class="title">BIT — HOLOGRAM IGNITION</div>
  <div class="subtitle">BIT sets out and leaves an empty dock. <b>~2 seconds later</b> his holographic projection <b>flickers on</b> — a struggling-tube ignition that stutters, then catches and holds.</div>

  <div class="stage-wrap">
    <div class="stage">
      <div class="floor"></div>
      <div class="pad"><img src="assets/bit_pad.png" alt=""></img></div>
      <div id="bit"></div>
      <canvas id="fx" width="370" height="460"></canvas>
      <canvas id="holo" width="112" height="112"></canvas>
    </div>
    <div class="phase" id="phase">BIT departed — dock empty…</div>
  </div>

  <div class="controls">
    <button class="btn" id="replay" type="button">▶ REPLAY</button>
    <button class="btn toggle on" id="loop" type="button">⟲ LOOP</button>
  </div>

  <div class="legend">
    <div class="step"><span class="t">0.0s</span> BIT departs</div>
    <div class="step"><span class="t">0–2.0s</span> empty dock</div>
    <div class="step"><span class="t">2.0s</span> flicker ignition</div>
    <div class="step"><span class="t">~2.9s</span> hologram online</div>
  </div>

  <script src="engine/bit.js"></script>
  <script src="engine/holo-bit.js"></script>
  <script>
    (function(){
      var RM = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // mount the live BIT (hidden) — its canvas is what the hologram samples
      var bitHost = document.getElementById('bit');
      if (window.BIT) window.__bit = BIT.mount(bitHost, { mood:'NEUTRAL', px:92, groundGlow:false });

      var holo = HoloBit.create({
        holoCanvas: document.getElementById('holo'),
        fxCanvas:   document.getElementById('fx'),
        bitCanvas:  function(){ return window.__bit && window.__bit.el; },
        ax: 185, emY: 390, topY: 286,
        reduceMotion: RM
      });

      var phase = document.getElementById('phase');
      function say(txt){ phase.textContent = txt; }

      var DELAY = 2000;          // empty-dock gap before ignition
      var HOLD  = 2600;          // how long the hologram stays up before the loop recycles
      var GAP   = 700;           // brief blank between loops
      var timers = [], looping = true, running = false;

      function clearTimers(){ timers.forEach(clearTimeout); timers = []; }
      function after(ms, fn){ var id = setTimeout(fn, ms); timers.push(id); return id; }

      function runOnce(){
        running = true;
        holo.stop();
        say('BIT departed — dock empty…');
        // engine handles: empty for DELAY, then the flicker ignition
        holo.start(RM ? 0 : DELAY);
        if (RM){ say('hologram online'); running = false; return; }
        after(DELAY + 120, function(){ say('// igniting //'); });
        after(DELAY + 980, function(){ say('hologram online'); running = false; if (looping) scheduleLoop(); });
      }
      function scheduleLoop(){
        after(HOLD, function(){
          if (!looping) return;
          holo.stop(); say('BIT departed — dock empty…');
          after(GAP, runOnce);
        });
      }

      document.getElementById('replay').addEventListener('click', function(){
        clearTimers(); runOnce();
      });
      var loopBtn = document.getElementById('loop');
      loopBtn.addEventListener('click', function(){
        looping = !looping; loopBtn.classList.toggle('on', looping);
        if (looping && !running){ clearTimers(); runOnce(); }
        else if (!looping){ /* let current cycle finish, just stop re-scheduling */ }
      });

      // kick off
      runOnce();
    })();
  </script>
</body>
</html>
